packages:
  - "apps/*"
  - "packages/*"
onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "prisma"
  - "unrs-resolver"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  codebase-memory-mcp: set this to true or false
  esbuild: true
  msgpackr-extract: true
  prisma: true
  unrs-resolver: true
