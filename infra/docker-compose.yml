version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: genzite-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-genzite}
      POSTGRES_USER: ${POSTGRES_USER:-genzite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment or a .env file}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: genzite-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
