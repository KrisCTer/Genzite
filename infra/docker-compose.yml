services:
  # ======================== DATA LAYER ========================
  db:
    image: postgres:15-alpine
    container_name: genzite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genzite_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genzite_password}
      POSTGRES_DB: ${POSTGRES_DB:-genzite_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genzite_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: genzite-cache
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: genzite-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,stat"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: genzite-kafka
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ======================== MICROSERVICES ========================
  gateway:
    build:
      context: ../apps/gateway
      dockerfile: Dockerfile.dev
    container_name: genzite-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      AUTH_BYPASS: "true"  # Set to "false" when identity-service is ready
      # JWT_SECRET: ${JWT_SECRET:-}  # Uncomment when identity-service is ready
      IDENTITY_SERVICE_URL: http://identity:3001
      SITE_SERVICE_URL: http://site:3002
      DATA_SERVICE_URL: http://data:3003
      MEDIA_SERVICE_URL: http://media:3004
      NOTIFICATION_SERVICE_URL: http://notification:3005
      AI_SERVICE_URL: http://ai:3006
    depends_on:
      - site
      - data
      - media
      - notification
      - ai
    volumes:
      - ../apps/gateway:/app
      - /app/node_modules

  identity:
    build:
      context: ../apps/identity-service
      dockerfile: Dockerfile.dev
    container_name: genzite-identity
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SERVICE_NAME: identity-service
      DATABASE_URL: "postgresql://${POSTGRES_USER:-genzite_user}:${POSTGRES_PASSWORD:-genzite_password}@db:5432/${POSTGRES_DB:-genzite_dev}?schema=identity"
      REDIS_HOST: cache
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../apps/identity-service:/app
      - /app/node_modules

  site:
    build:
      context: ../apps/site-service
      dockerfile: Dockerfile.dev
    container_name: genzite-site
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      SERVICE_NAME: site-service
      DATABASE_URL: "postgresql://${POSTGRES_USER:-genzite_user}:${POSTGRES_PASSWORD:-genzite_password}@db:5432/${POSTGRES_DB:-genzite_dev}?schema=site"
      REDIS_HOST: cache
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../apps/site-service:/app
      - /app/node_modules

  data:
    build:
      context: ../apps/data-service
      dockerfile: Dockerfile.dev
    container_name: genzite-data
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: "postgresql://${POSTGRES_USER:-genzite_user}:${POSTGRES_PASSWORD:-genzite_password}@db:5432/${POSTGRES_DB:-genzite_dev}?schema=data"
      REDIS_HOST: cache
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../apps/data-service:/app
      - /app/node_modules

  media:
    build:
      context: ../apps/media-service
      dockerfile: Dockerfile.dev
    container_name: genzite-media
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: "postgresql://${POSTGRES_USER:-genzite_user}:${POSTGRES_PASSWORD:-genzite_password}@db:5432/${POSTGRES_DB:-genzite_dev}?schema=media"
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-genzite-media-dev}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../apps/media-service:/app
      - /app/node_modules

  notification:
    build:
      context: ../apps/notification-service
      dockerfile: Dockerfile.dev
    container_name: genzite-notification
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      SERVICE_NAME: notification-service
      DATABASE_URL: "postgresql://${POSTGRES_USER:-genzite_user}:${POSTGRES_PASSWORD:-genzite_password}@db:5432/${POSTGRES_DB:-genzite_dev}?schema=notification"
      REDIS_HOST: cache
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: notification-service-group
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../apps/notification-service:/app
      - /app/node_modules

  ai:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile.dev
    container_name: genzite-ai
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      DATABASE_URL: "postgresql://${POSTGRES_USER:-genzite_user}:${POSTGRES_PASSWORD:-genzite_password}@db:5432/${POSTGRES_DB:-genzite_dev}?schema=ai"
      REDIS_HOST: cache
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../apps/ai-service:/app
      - /app/node_modules

  # ======================== FRONTEND ========================
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile.dev
    container_name: genzite-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    depends_on:
      - gateway
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
